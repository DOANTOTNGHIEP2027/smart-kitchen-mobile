name: CI — Mobile

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
          cache: true

      - name: Create env files for CI
        run: |
          cat > config/env/dev.dart << 'EOF'
          const String baseUrl = 'http://localhost:8080/api';
          const String aiBaseUrl = 'http://localhost:8000';
          const String appEnv = 'dev';
          EOF
          cat > config/env/prod.dart << 'EOF'
          const String baseUrl = 'https://api.example.com/api';
          const String aiBaseUrl = 'https://ai.example.com';
          const String appEnv = 'prod';
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Coverage report (PR comment)
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          title: "Coverage Report — Mobile"

  build-web:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
          cache: true

      - name: Create prod env file
        run: |
          cat > config/env/prod.dart << 'EOF'
          const String baseUrl = 'https://api.example.com/api';
          const String aiBaseUrl = 'https://ai.example.com';
          const String appEnv = 'prod';
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --dart-define=ENV=prod

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/smart-kitchen-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
